<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Payment Approvals</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body.admin-page {
      background: linear-gradient(180deg, #fff7f8, #ffffff);
      color: var(--text);
    }
    .admin-shell {
      max-width: 1320px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    .admin-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .admin-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: 0 12px 28px rgba(142, 29, 43, 0.06);
    }
    .admin-card strong {
      display: block;
      font-size: 1.75rem;
      color: var(--gold);
      margin-top: 0.25rem;
    }
    .admin-list {
      display: grid;
      gap: 1rem;
    }
    .admin-request {
      display: grid;
      gap: 0.9rem;
      grid-template-columns: minmax(0, 1.2fr) minmax(220px, 0.8fr);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: 0 12px 28px rgba(142, 29, 43, 0.06);
    }
    .admin-request-head {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .admin-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 1px solid transparent;
    }
    .admin-status.pending { background: rgba(245, 158, 11, 0.12); color: #b45309; border-color: rgba(245, 158, 11, 0.25); }
    .admin-status.approved { background: rgba(34, 197, 94, 0.12); color: #166534; border-color: rgba(34, 197, 94, 0.25); }
    .admin-status.rejected { background: rgba(239, 68, 68, 0.12); color: #991b1b; border-color: rgba(239, 68, 68, 0.25); }
    .admin-status.expired { background: rgba(107, 114, 128, 0.12); color: #374151; border-color: rgba(107, 114, 128, 0.25); }
    .admin-status.used { background: rgba(14, 165, 233, 0.12); color: #0f4c81; border-color: rgba(14, 165, 233, 0.25); }
    .admin-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.55rem;
      font-size: 0.86rem;
      color: var(--text-sec);
    }
    .admin-meta b { color: var(--text); }
    .admin-proof img {
      width: 100%;
      max-width: 260px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
    }
    .admin-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }
    .admin-empty {
      padding: 2rem;
      text-align: center;
      color: var(--text-sec);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.7);
    }
    @media (max-width: 900px) {
      .admin-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .admin-request { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .admin-grid { grid-template-columns: 1fr; }
      .admin-meta { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="admin-page">
  <header class="header">
    <div class="logo">🏏 Admin Dashboard</div>
    <div style="display:flex;gap:0.6rem;align-items:center;flex-wrap:wrap;">
      <a class="btn btn-secondary" href="manual-setup.html">Back to Manual Setup</a>
      <a class="btn btn-ghost" href="index.html">Home</a>
    </div>
  </header>

  <main class="admin-shell">
    <div class="admin-top">
      <div>
        <h1 class="display" style="font-size:2rem;margin-bottom:0.3rem;">Payment Approvals</h1>
        <p style="color:var(--text-sec);max-width:780px;">Review manual auction payment requests, verify the UTR and screenshot, then approve or reject without opening Firebase directly.</p>
      </div>
      <button class="btn btn-primary" onclick="loadPaymentRequests()">Refresh</button>
    </div>

    <section class="admin-grid" id="adminStats">
      <div class="admin-card"><span>Pending</span><strong id="statPending">0</strong></div>
      <div class="admin-card"><span>Approved</span><strong id="statApproved">0</strong></div>
      <div class="admin-card"><span>Rejected</span><strong id="statRejected">0</strong></div>
      <div class="admin-card"><span>Expired</span><strong id="statExpired">0</strong></div>
    </section>

    <section id="adminRequests" class="admin-list">
      <div class="admin-empty">Loading payment requests...</div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/utils.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/admin-dashboard.js"></script>
</body>
</html>
